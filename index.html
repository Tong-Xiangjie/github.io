<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>总网站入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 整体纯黑背景（保留要求） */
        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Segoe UI', 'Inter', 'Fira Code', monospace, system-ui;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 面板纯黑，无玻璃模糊、无阴影、无边框 */
        .glass-panel {
            background: #000000;
            border-radius: 2.5rem;
            border: none;
            box-shadow: none;
            width: 100%;
            max-width: 580px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .content {
            padding: 2.2rem 2rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        /* 主图尺寸改为120×120，适配放大需求 */
        .logo-icon {
            font-size: 3.2rem;
            opacity: 0.9;
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        /* 标题渐变改为蓝色荧光系，匹配图片 */
        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e6f3ff, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.5rem;
        }
        .sub {
            font-size: 0.75rem;
            color: #7e8a9e;
            border-top: 1px dashed #2a3644;
            display: inline-block;
            margin-top: 0.6rem;
            padding-top: 0.5rem;
        }

        .password-section {
            transition: all 0.2s;
        }
        .input-group {
            background: #0e1622cc;
            border-radius: 2rem;
            border: 1px solid #2a3644;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            margin-bottom: 1rem;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            font-weight: 500;
            color: #c0f0ff;
            width: 100%;
            outline: none;
            font-family: monospace;
        }
        .input-group input::placeholder {
            color: #3a465a;
            letter-spacing: 2px;
            font-size: 1rem;
            font-family: monospace;
        }
        .lock-icon {
            color: #00aaff;
            font-size: 1.4rem;
        }

        /* 按钮主题色改为蓝色荧光系，hover发光匹配图片 */
        button {
            background: linear-gradient(95deg, #1f2a3e, #0f172a);
            border: 1px solid #2e3b4e;
            color: #b9e2ff;
            font-weight: 600;
            padding: 0.8rem 1.4rem;
            border-radius: 2.5rem;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.97);
        }
        button:hover {
            background: #1f314a;
            border-color: #3c8dbc;
            color: white;
            box-shadow: 0 0 8px #2d68ff;
        }

        .error-msg {
            color: #ff7a6e;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            min-height: 2.5rem;
            font-weight: 500;
            background: transparent;
            border-radius: 2rem;
            padding: 0.4rem;
        }
        .timer-block {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #f2b56b;
            background: transparent;
            border-radius: 2rem;
            padding: 0.5rem;
        }

        /* 日期时间显示样式 */
        .datetime-display {
            text-align: center;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #5a6e8a;
            font-family: monospace;
            letter-spacing: 0.5px;
            border-top: 1px dashed #2a3644;
            padding-top: 1rem;
        }
        .dashboard .datetime-display {
            margin-top: 1rem;
            border-top: 1px dashed #2a3644;
        }

        .dashboard {
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 左侧标题条改为蓝色荧光 */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            border-left: 5px solid #00aaff;
            padding-left: 1rem;
            color: #e6f3ff;
        }

        .site-card {
            background: #000000;
            border-radius: 1.8rem;
            margin-bottom: 1.2rem;
            padding: 1rem 1.5rem;
            border: 1px solid #2c3e55;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .site-card:hover {
            background: #000000;
            border-color: #3c8dbc;
            transform: translateX(6px);
        }
        .site-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #cde0ff;
            letter-spacing: 1px;
        }
        .site-link {
            background: #0b1422;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            text-decoration: none;
            color: #00aaff;
            border: 1px solid #2e5570;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .site-link:hover {
            background: #00aaff20;
            color: white;
            border-color: #00aaff;
            box-shadow: 0 0 6px #00aaff;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            text-align: center;
            color: #3f506e;
            border-top: 1px solid #1e2a3a;
            padding-top: 1rem;
        }
        .back-btn {
            background: none;
            border: 1px solid #3e506e;
            margin-top: 1rem;
            color: #9ab3cf;
            width: auto;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        input:disabled, button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width: 480px) {
            .content { padding: 1.5rem; }
            .site-card { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
            .site-link { align-self: flex-start; }
        }
    </style>
</head>
<body>
<div class="glass-panel" id="appRoot">
    <div class="content">
        <!-- 未解锁区域 (密码界面) -->
        <div id="lockZone">
            <div class="logo-area">
                <img src="image/headphoto.png" class="logo-icon">
                <h1>请验证后进入</h1>
                <div class="sub">VERIFICATION GATE</div>
            </div>
            <div class="password-section">
                <div class="input-group">
                    <span class="lock-icon"></span>
                    <input type="password" id="passwordInput" maxlength="6" placeholder="请输入6位数字密码" inputmode="numeric" pattern="\d*">
                </div>
                <button id="unlockBtn">验证/VERIFY</button>
                <div id="errorMsg" class="error-msg"></div>
                <div id="timerInfo" class="timer-block" style="display: none;"></div>
            </div>
            <!-- 验证页面的日期时间显示 -->
            <div class="datetime-display" id="lockDatetime">--年--月--日 --:--:--</div>
        </div>

        <!-- 解锁后网站列表区域 -->
        <div id="dashboardZone" class="dashboard">
            <div class="logo-area" style="margin-bottom: 1rem;">
                <img src="image/headphoto.png" class="logo-icon">
                <h1>网页总站</h1>
                <div class="sub">MAIN PORTAL</div>
            </div>
            <div class="section-title">分站入口</div>
            <div class="site-card">
                <span class="site-name">钱币收藏档案</span>
                <a href="https://Tong-Xiangjie.github.io/notecollection/" class="site-link" target="_blank" rel="noopener noreferrer">
                    notecollection ↗
                </a>
            </div>
            <!-- 预留扩展其他分站，未来可加 -->
            <div class="site-card" style="opacity: 0.7;">
                <span class="site-name">更多站点 (敬请期待)</span>
                <span class="site-link" style="background:#11161f; cursor:default;">即将开放</span>
            </div>
            <!-- 解锁页面的日期时间显示 -->
            <div class="datetime-display" id="dashboardDatetime">--年--月--日 --:--:--</div>
            <div class="footer-note">
                网页建立时间：2026年4月4日<br>© 2026 铜香结 版权所有<br>Powered by GitHub Pages
            </div>
            <button id="resetLockBtn" class="back-btn">锁定</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 阶梯锁定配置 ----------
        const VALID_CODES = new Set(["070529", "790815"]);
        
        // 阶梯锁定时间序列（秒）：第1次锁30秒，第2次锁60秒(1分钟)，第3次锁120秒(2分钟)，第4次锁180秒(3分钟)，第5次及以后锁300秒(5分钟)
        const LOCK_STEPS = [30, 60, 120, 180, 300];
        const MAX_LOCK_SECONDS = 300;  // 最高5分钟
        
        // 状态变量
        let lockUntil = 0;              // 锁定截止时间戳
        let failCount = 0;              // 当前连续错误次数（未锁定期间累加，达到3触发锁定）
        let lockLevel = 0;              // 当前是第几次锁定（0=第一次锁定，1=第二次...用于决定锁定时间）
        let timerInterval = null;
        let datetimeInterval = null;    // 日期时间更新定时器
        
        // DOM 元素
        const lockZone = document.getElementById('lockZone');
        const dashboardZone = document.getElementById('dashboardZone');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const timerInfoDiv = document.getElementById('timerInfo');
        const resetLockBtn = document.getElementById('resetLockBtn');
        const lockDatetimeEl = document.getElementById('lockDatetime');
        const dashboardDatetimeEl = document.getElementById('dashboardDatetime');
        
        // localStorage 持久化
        const STORAGE_LOCK_UNTIL = 'lockUntilTimestamp';
        const STORAGE_LOCK_LEVEL = 'lockLevel';
        
        // ---------- 日期时间显示函数 ----------
        // 格式化日期时间：2026年4月4日 23:59:59
        function formatCurrentDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            return `${year}年${month}月${day}日 ${hours}:${minutes}:${seconds}`;
        }
        
        // 更新所有页面的日期时间显示
        function updateAllDatetime() {
            const datetimeStr = formatCurrentDateTime();
            if (lockDatetimeEl) {
                lockDatetimeEl.textContent = datetimeStr;
            }
            if (dashboardDatetimeEl) {
                dashboardDatetimeEl.textContent = datetimeStr;
            }
        }
        
        // 启动日期时间定时器（每秒更新）
        function startDatetimeTimer() {
            if (datetimeInterval) {
                clearInterval(datetimeInterval);
            }
            // 立即更新一次
            updateAllDatetime();
            datetimeInterval = setInterval(updateAllDatetime, 1000);
        }
        
        // 停止日期时间定时器（页面关闭时可选，但保留也没问题）
        function stopDatetimeTimer() {
            if (datetimeInterval) {
                clearInterval(datetimeInterval);
                datetimeInterval = null;
            }
        }
        
        // 格式化时间显示：大于等于60秒显示"X分Y秒"，60秒显示"1分0秒"
        function formatTime(seconds) {
            if (seconds < 60) {
                return seconds + '秒';
            }
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (secs === 0) {
                return minutes + '分0秒';
            }
            return minutes + '分' + secs + '秒';
        }
        
        // 根据锁定次数获取锁定时长（秒）
        function getLockDuration(level) {
            if (level < LOCK_STEPS.length) {
                return LOCK_STEPS[level];
            }
            return MAX_LOCK_SECONDS;
        }
        
        // 持久化锁定到期时间
        function persistLockUntil() {
            if (lockUntil > 0) {
                localStorage.setItem(STORAGE_LOCK_UNTIL, lockUntil.toString());
            } else {
                localStorage.removeItem(STORAGE_LOCK_UNTIL);
            }
        }
        
        // 持久化锁定等级
        function persistLockLevel() {
            localStorage.setItem(STORAGE_LOCK_LEVEL, lockLevel.toString());
        }
        
        function clearPersistedLock() {
            localStorage.removeItem(STORAGE_LOCK_UNTIL);
            localStorage.removeItem(STORAGE_LOCK_LEVEL);
        }
        
        // 从存储恢复锁定状态
        function restoreLockFromStorage() {
            const storedUntil = localStorage.getItem(STORAGE_LOCK_UNTIL);
            const storedLevel = localStorage.getItem(STORAGE_LOCK_LEVEL);
            
            if (storedLevel) {
                lockLevel = parseInt(storedLevel, 10);
                if (isNaN(lockLevel)) lockLevel = 0;
            } else {
                lockLevel = 0;
            }
            
            if (storedUntil) {
                const storedTime = parseInt(storedUntil, 10);
                const now = Date.now();
                if (storedTime > now) {
                    lockUntil = storedTime;
                    return true;
                } else {
                    localStorage.removeItem(STORAGE_LOCK_UNTIL);
                }
            }
            return false;
        }
        
        function clearTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        // 解除锁定（仅解除锁定状态，不清除lockLevel，因为阶梯等级需要保留直到登录成功）
        function releaseLockOnly() {
            lockUntil = 0;
            clearPersistedLock();
            persistLockLevel();  // 保留lockLevel
            clearTimer();
            updateLockUI();
        }
        
        // 登录成功时完全重置所有状态
        function resetAllOnSuccess() {
            clearTimer();
            lockUntil = 0;
            failCount = 0;
            lockLevel = 0;           // 成功登录，阶梯等级归零
            clearPersistedLock();    // 会清除level和until
            updateLockUI();
        }
        
        // 触发锁定
        function applyLockout() {
            const now = Date.now();
            const lockSeconds = getLockDuration(lockLevel);
            const lockDurationMs = lockSeconds * 1000;
            lockUntil = now + lockDurationMs;
            
            // 锁定等级递增（下一次锁定时间更长）
            lockLevel++;
            
            // 持久化
            persistLockUntil();
            persistLockLevel();
            
            // 重置当前错误计数（因为已经触发锁定，重新开始计数）
            failCount = 0;
            
            clearTimer();
            updateLockUI();
            
            // 启动倒计时刷新
            timerInterval = setInterval(() => {
                const nowMs = Date.now();
                const remaining = lockUntil - nowMs;
                if (remaining <= 0) {
                    clearTimer();
                    releaseLockOnly();
                    updateLockUI();
                    errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                    setTimeout(() => {
                        if (errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') {
                            errorMsgDiv.innerHTML = '';
                        }
                    }, 1800);
                    passwordInput.value = '';
                    passwordInput.focus();
                } else {
                    const secs = Math.ceil(remaining / 1000);
                    timerInfoDiv.style.display = 'block';
                    timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${formatTime(secs)} 后再试。`;
                }
            }, 200);
        }
        
        function updateLockUI() {
            const now = Date.now();
            const isCurrentlyLocked = (lockUntil > now);
            
            if (isCurrentlyLocked) {
                const remainSeconds = Math.ceil((lockUntil - now) / 1000);
                if (remainSeconds > 0) {
                    timerInfoDiv.style.display = 'block';
                    timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${formatTime(remainSeconds)} 后再试。`;
                }
                passwordInput.disabled = true;
                unlockBtn.disabled = true;
                errorMsgDiv.innerHTML = '账户暂时锁定，请稍后再试';
            } else {
                passwordInput.disabled = false;
                unlockBtn.disabled = false;
                timerInfoDiv.style.display = 'none';
                if (errorMsgDiv.innerHTML.includes('锁定') && !errorMsgDiv.innerHTML.includes('错误')) {
                    if (failCount === 0) errorMsgDiv.innerHTML = '';
                }
            }
        }
        
        function handleFail() {
            if (lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = '系统锁定中，请等待倒计时结束。';
                return;
            }
            
            failCount++;
            const remainingAttempts = 3 - failCount;
            
            if (failCount >= 3) {
                const lockSec = getLockDuration(lockLevel);
                errorMsgDiv.innerHTML = `已连续错误3次！系统锁定${formatTime(lockSec)}，无法进行任何操作`;
                applyLockout();
                passwordInput.value = '';
            } else {
                errorMsgDiv.innerHTML = `密码错误！还剩 ${remainingAttempts} 次尝试机会，连续错误3次将锁定`;
                passwordInput.value = '';
                passwordInput.focus();
                timerInfoDiv.style.display = 'none';
            }
            
            const panel = document.querySelector('.glass-panel');
            if (panel) {
                panel.style.transform = 'translateX(3px)';
                setTimeout(() => { if (panel) panel.style.transform = ''; }, 10);
            }
        }
        
        function handleSuccess() {
            clearTimer();
            resetAllOnSuccess();
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            
            lockZone.style.display = 'none';
            dashboardZone.style.display = 'block';
        }
        
        function verifyPassword() {
            if (lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = `锁定倒计时进行中，请耐心等待。`;
                return;
            }
            
            const rawValue = passwordInput.value;
            const trimmed = rawValue.trim();
            if (trimmed.length !== 6) {
                errorMsgDiv.innerHTML = '请输入6位数字密码';
                passwordInput.value = '';
                return;
            }
            if (!/^\d{6}$/.test(trimmed)) {
                errorMsgDiv.innerHTML = '密码必须为6位数字 (0-9)';
                passwordInput.value = '';
                return;
            }
            
            if (VALID_CODES.has(trimmed)) {
                handleSuccess();
            } else {
                handleFail();
            }
        }
        
        function resetToLock() {
            dashboardZone.style.display = 'none';
            lockZone.style.display = 'block';
            
            // 注意：不清除 lockUntil 和 lockLevel，保留当前锁定状态
            // 只重置界面相关
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            updateLockUI();
            passwordInput.focus();
        }
        
        function onEnterKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (lockZone.style.display !== 'none') {
                    if (!(lockUntil > Date.now())) {
                        verifyPassword();
                    }
                }
            }
        }
        
        function enforceNumericInput(e) {
            let input = e.target;
            let value = input.value;
            let newValue = value.replace(/\D/g, '');
            if (newValue.length > 6) newValue = newValue.slice(0,6);
            if (newValue !== value) {
                input.value = newValue;
            }
        }
        
        function initUI() {
            lockZone.style.display = 'block';
            dashboardZone.style.display = 'none';
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            failCount = 0;
            
            const hasValidLock = restoreLockFromStorage();
            if (!hasValidLock) {
                lockUntil = 0;
                // 如果没有有效锁定，确保lockLevel合理（保留之前存储的level或为0）
                if (isNaN(lockLevel)) lockLevel = 0;
            }
            
            updateLockUI();
            
            if (lockUntil > Date.now()) {
                clearTimer();
                timerInterval = setInterval(() => {
                    const nowMs = Date.now();
                    const remaining = lockUntil - nowMs;
                    if (remaining <= 0) {
                        clearTimer();
                        releaseLockOnly();
                        updateLockUI();
                        errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                        setTimeout(() => {
                            if (errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') {
                                errorMsgDiv.innerHTML = '';
                            }
                        }, 1800);
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        const secs = Math.ceil(remaining / 1000);
                        timerInfoDiv.style.display = 'block';
                        timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${formatTime(secs)} 后再试。`;
                    }
                }, 200);
            }
            
            // 启动日期时间显示（每秒更新）
            startDatetimeTimer();
            
            unlockBtn.addEventListener('click', verifyPassword);
            resetLockBtn.addEventListener('click', resetToLock);
            passwordInput.addEventListener('input', enforceNumericInput);
            passwordInput.addEventListener('keypress', onEnterKey);
            passwordInput.focus();
        }
        
        initUI();
        
        setInterval(() => {
            if (lockUntil > 0 && lockUntil <= Date.now()) {
                releaseLockOnly();
                updateLockUI();
            }
        }, 1000);
    })();
</script>
</body>
</html>
