.reset-btn{background:#f0ebe3;color:#8b6b4f;border:1px solid #e2d5c8;padding:0.6rem 1rem;border-radius:0.6rem;cursor:pointer;}
.search-tip{font-size:0.75rem;color:#b1967c;margin-top:0.3rem;}

.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem;margin-bottom:2rem;}
.category-card{background:white;border-radius:1.5rem;box-shadow:0 6px 16px rgba(0,0,0,0.08);text-align:center;padding:1.5rem;border:1px solid #e2d5c8;transition:0.2s;cursor:pointer;}

.count-badge{background:#e8d9cc;padding:0.2rem 0.7rem;border-radius:40px;font-size:0.7rem;margin-top:0.6rem;}
.footer{text-align:center;margin-top:1.5rem;font-size:0.7rem;color:#b1967c;}

function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    categoryOrder.forEach(id => {
        const cat = allData[id];
        let total = 0;
        cat.series.forEach(s => total += s.copies.length);
        let url = id === "commemorative" ? "commemorative.html" : "#";
        grid.innerHTML += `
            <div class="category-card" onclick="location.href='${url}'">
                <div class="category-icon">${cat.icon}</div>
                <h3>${cat.name}</h3>
                <p>${cat.desc}</p>
                <div class="count-badge">📌 ${total} 张</div>
            </div>`;
    });
}

function doSearch() {
    const kw = document.getElementById('searchInput').value.trim();
    const type = document.getElementById('searchType').value;
    if (!kw) return;
    location.href = `commemorative.html?from=index&keyword=${encodeURIComponent(kw)}&type=${type}`;
}

function resetSearch() {
    document.getElementById('searchInput').value = '';
}
