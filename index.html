<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>总网站入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 整体纯黑背景（保留要求） */
        body {
            min-height: 100vh;
            background: #000000;
            font-family: 'Segoe UI', 'Inter', 'Fira Code', monospace, system-ui;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 面板纯黑，无玻璃模糊、无阴影、无边框 */
        .glass-panel {
            background: #000000;
            border-radius: 2.5rem;
            border: none;
            box-shadow: none;
            width: 100%;
            max-width: 580px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .content {
            padding: 2.2rem 2rem 2.5rem;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        /* 主图尺寸改为120×120，适配放大需求 */
        .logo-icon {
            font-size: 3.2rem;
            opacity: 0.9;
            width: 120px;
            height: 120px;
            object-fit: contain;
        }
        /* 标题渐变改为蓝色荧光系，匹配图片 */
        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #e6f3ff, #00aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.5rem;
        }
        .sub {
            font-size: 0.75rem;
            color: #7e8a9e;
            border-top: 1px dashed #2a3644;
            display: inline-block;
            margin-top: 0.6rem;
            padding-top: 0.5rem;
        }

        .password-section {
            transition: all 0.2s;
        }
        .input-group {
            background: #0e1622cc;
            border-radius: 2rem;
            border: 1px solid #2a3644;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            margin-bottom: 1rem;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            font-weight: 500;
            color: #c0f0ff;
            width: 100%;
            outline: none;
            font-family: monospace;
        }
        .input-group input::placeholder {
            color: #3a465a;
            letter-spacing: 2px;
            font-size: 1rem;
            font-family: monospace;
        }
        .lock-icon {
            color: #00aaff;
            font-size: 1.4rem;
        }

        /* 按钮主题色改为蓝色荧光系，hover发光匹配图片 */
        button {
            background: linear-gradient(95deg, #1f2a3e, #0f172a);
            border: 1px solid #2e3b4e;
            color: #b9e2ff;
            font-weight: 600;
            padding: 0.8rem 1.4rem;
            border-radius: 2.5rem;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.97);
        }
        button:hover {
            background: #1f314a;
            border-color: #3c8dbc;
            color: white;
            box-shadow: 0 0 8px #2d68ff;
        }

        .error-msg {
            color: #ff7a6e;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            min-height: 2.5rem;
            font-weight: 500;
            background: transparent;
            border-radius: 2rem;
            padding: 0.4rem;
        }
        .timer-block {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #f2b56b;
            background: transparent;
            border-radius: 2rem;
            padding: 0.5rem;
        }

        .dashboard {
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* 左侧标题条改为蓝色荧光 */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            border-left: 5px solid #00aaff;
            padding-left: 1rem;
            color: #e6f3ff;
        }

        .site-card {
            background: #000000;
            border-radius: 1.8rem;
            margin-bottom: 1.2rem;
            padding: 1rem 1.5rem;
            border: 1px solid #2c3e55;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .site-card:hover {
            background: #000000;
            border-color: #3c8dbc;
            transform: translateX(6px);
        }
        .site-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #cde0ff;
            letter-spacing: 1px;
        }
        .site-link {
            background: #0b1422;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            text-decoration: none;
            color: #00aaff;
            border: 1px solid #2e5570;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .site-link:hover {
            background: #00aaff20;
            color: white;
            border-color: #00aaff;
            box-shadow: 0 0 6px #00aaff;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #3f506e;
            border-top: 1px solid #1e2a3a;
            padding-top: 1rem;
        }
        .back-btn {
            background: none;
            border: 1px solid #3e506e;
            margin-top: 1rem;
            color: #9ab3cf;
            width: auto;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        input:disabled, button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width: 480px) {
            .content { padding: 1.5rem; }
            .site-card { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
            .site-link { align-self: flex-start; }
        }
    </style>
</head>
<body>
<div class="glass-panel" id="appRoot">
    <div class="content">
        <!-- 未解锁区域 (密码界面) -->
        <div id="lockZone">
            <div class="logo-area">
                <img src="image/headphoto.png" class="logo-icon">
                <h1>请验证后进入</h1>
                <div class="sub">VERIFICATION GATE</div>
            </div>
            <div class="password-section">
                <div class="input-group">
                    <span class="lock-icon"></span>
                    <input type="password" id="passwordInput" maxlength="6" placeholder="请输入6位数字密码" inputmode="numeric" pattern="\d*">
                </div>
                <button id="unlockBtn">验证/VERIFY</button>
                <div id="errorMsg" class="error-msg"></div>
                <div id="timerInfo" class="timer-block" style="display: none;"></div>
            </div>
        </div>

        <!-- 解锁后网站列表区域 -->
        <div id="dashboardZone" class="dashboard">
            <div class="logo-area" style="margin-bottom: 1rem;">
                <img src="image/headphoto.png" class="logo-icon">
                <h1>网页总站</h1>
                <div class="sub">MAIN PORTAL</div>
            </div>
            <div class="section-title">分站入口</div>
            <div class="site-card">
                <span class="site-name">钱币收藏档案</span>
                <a href="https://Tong-Xiangjie.github.io/notecollection/" class="site-link" target="_blank" rel="noopener noreferrer">
                    notecollection ↗
                </a>
            </div>
            <!-- 预留扩展其他分站，未来可加 -->
            <div class="site-card" style="opacity: 0.7;">
                <span class="site-name">更多站点 (敬请期待)</span>
                <span class="site-link" style="background:#11161f; cursor:default;">即将开放</span>
            </div>
            <div class="footer-note">
                网页建立时间：2026年4月4日<br>© 2026 铜香结 版权所有<br>Powered by GitHub Pages
            </div>
            <button id="resetLockBtn" class="back-btn">锁定</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 状态管理 ----------
        // 有效密码列表 (6位数字)
        const VALID_CODES = new Set(["070529", "790815"]);
        const LOCK_DURATION_MS = 30000; // 30秒锁定

        // 锁定状态变量
        let lockUntil = 0;            // 时间戳 (毫秒) 锁定的截止时刻
        let failCount = 0;            // 当前连续错误次数 (每次锁定周期内)
        let timerInterval = null;     // 倒计时刷新句柄

        // DOM 元素
        const lockZone = document.getElementById('lockZone');
        const dashboardZone = document.getElementById('dashboardZone');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const timerInfoDiv = document.getElementById('timerInfo');
        const resetLockBtn = document.getElementById('resetLockBtn');

        // ---------- localStorage 持久化 ----------
        const STORAGE_KEY = 'lockUntilTimestamp';

        // 保存锁定到期时间到 localStorage
        function persistLockUntil() {
            if (lockUntil > 0) {
                localStorage.setItem(STORAGE_KEY, lockUntil.toString());
            } else {
                localStorage.removeItem(STORAGE_KEY);
            }
        }

        // 从 localStorage 恢复锁定状态
        function restoreLockFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const storedTime = parseInt(stored, 10);
                const now = Date.now();
                if (storedTime > now) {
                    // 锁定尚未过期
                    lockUntil = storedTime;
                    // 注意：failCount 需要重置，因为刷新后不知道之前错了多少次
                    // 但为了安全，锁定结束后重新计数，锁定期间 failCount 应为 0 或保持锁定标记即可
                    failCount = 0;
                    return true;
                } else {
                    // 存储的锁已过期，清除
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
            return false;
        }

        // 清除持久化锁
        function clearPersistedLock() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // 辅助函数: 清除计时器
        function clearTimer() {
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // 释放锁定 (重置错误计数, 清空计时器, 清除持久化)
        function releaseLock() {
            const wasLocked = (lockUntil > Date.now());
            lockUntil = 0;
            if (wasLocked) {
                failCount = 0;
                clearPersistedLock();
            }
            clearTimer();
            updateLockUI();
            // 清理错误消息残留
            if (!errorMsgDiv.innerHTML.includes('密码') && !errorMsgDiv.innerHTML.includes('错误')) {
                if (failCount === 0) errorMsgDiv.innerHTML = '';
            }
        }

        // 更新界面锁定状态 (禁用输入框、按钮、显示倒计时等)
        function updateLockUI() {
            const now = Date.now();
            const isCurrentlyLocked = (lockUntil > now);

            if (isCurrentlyLocked) {
                const remainSeconds = Math.ceil((lockUntil - now) / 1000);
                if (remainSeconds > 0) {
                    timerInfoDiv.style.display = 'block';
                    timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${remainSeconds} 秒后再试。`;
                } else {
                    // 理论上锁到期会在倒计时 tick 里清理，但以防万一
                    if (lockUntil <= now) {
                        releaseLock();
                        return;
                    }
                }
                // 禁用输入和按钮
                passwordInput.disabled = true;
                unlockBtn.disabled = true;
                errorMsgDiv.innerHTML = '账户暂时锁定，请稍后再试';
            } else {
                // 未锁定状态
                if (lockUntil === 0 || lockUntil <= now) {
                    // 确保释放锁（清理持久化等）
                    if (lockUntil > 0 && lockUntil <= now) {
                        releaseLock();
                    }
                }
                passwordInput.disabled = false;
                unlockBtn.disabled = false;
                timerInfoDiv.style.display = 'none';
                // 如果错误消息还是锁定相关的，清空
                if (errorMsgDiv.innerHTML.includes('锁定') || errorMsgDiv.innerHTML.includes('等待')) {
                    if (failCount === 0) errorMsgDiv.innerHTML = '';
                }
            }
        }

        // 设置锁定30秒 (保留当前错误次数已经达到3)
        function applyLockout() {
            const now = Date.now();
            lockUntil = now + LOCK_DURATION_MS;
            // 持久化锁定时间戳
            persistLockUntil();
            // 锁定期间错误计数归零（锁定结束后重新累计）
            failCount = 0;
            clearTimer();
            updateLockUI();

            // 启动倒计时刷新
            timerInterval = setInterval(() => {
                const nowMs = Date.now();
                const remaining = lockUntil - nowMs;
                if (remaining <= 0) {
                    // 锁定到期
                    clearTimer();
                    releaseLock();      // 重置failCount并解锁界面
                    updateLockUI();
                    errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                    setTimeout(() => {
                        if (errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') {
                            errorMsgDiv.innerHTML = '';
                        }
                    }, 1800);
                    passwordInput.value = '';
                    passwordInput.focus();
                } else {
                    const secs = Math.ceil(remaining / 1000);
                    timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${secs} 秒后再试。`;
                }
            }, 200);
        }

        // 处理验证失败
        function handleFail() {
            // 先检查当前是否锁定中
            if (lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = '系统锁定中，请等待倒计时结束。';
                return;
            }

            // 未锁定状态，增加错误计数
            failCount++;
            const remainingAttempts = 3 - failCount;
            if (failCount >= 3) {
                // 达到三次错误 -> 触发锁定30秒
                errorMsgDiv.innerHTML = `已连续错误3次！系统锁定30秒，无法进行任何操作`;
                applyLockout();
                passwordInput.value = '';
            } else {
                // 未达三次，显示剩余尝试
                errorMsgDiv.innerHTML = `密码错误！还剩 ${remainingAttempts} 次尝试机会，连续错误3次将锁定30秒`;
                passwordInput.value = '';
                passwordInput.focus();
                timerInfoDiv.style.display = 'none';
            }
            // 震动效果(可选)
            const panel = document.querySelector('.glass-panel');
            if (panel) {
                panel.style.transform = 'translateX(3px)';
                setTimeout(() => { if (panel) panel.style.transform = ''; }, 10);
            }
        }

        // 验证成功: 进入仪表板
        function handleSuccess() {
            // 清除锁定状态、重置计数器、清除计时器
            clearTimer();
            lockUntil = 0;
            failCount = 0;
            clearPersistedLock();
            // 清空输入框以及错误消息
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';

            // 切换显示: 隐藏锁界面，展示仪表板
            lockZone.style.display = 'none';
            dashboardZone.style.display = 'block';
        }

        // 验证密码核心
        function verifyPassword() {
            // 如果当前处于锁定状态，阻止验证
            if (lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = `锁定倒计时进行中，请耐心等待。`;
                return;
            }

            const rawValue = passwordInput.value;
            const trimmed = rawValue.trim();
            if (trimmed.length !== 6) {
                errorMsgDiv.innerHTML = '请输入6位数字密码';
                passwordInput.value = '';
                return;
            }
            if (!/^\d{6}$/.test(trimmed)) {
                errorMsgDiv.innerHTML = '密码必须为6位数字 (0-9)';
                passwordInput.value = '';
                return;
            }

            if (VALID_CODES.has(trimmed)) {
                // 密码正确
                failCount = 0;
                if (lockUntil) lockUntil = 0;
                clearTimer();
                clearPersistedLock();
                handleSuccess();
            } else {
                handleFail();
            }
        }

        // 重置/退出登录 (从仪表板返回锁定界面，重置所有状态)
        function resetToLock() {
            // 清除dashboard显示，显示锁界面
            dashboardZone.style.display = 'none';
            lockZone.style.display = 'block';

            // 重置所有安全状态: 清除锁定计时器, 重置失败次数, 清除锁定时间戳
            clearTimer();
            // 注意：这里不能直接清 lockUntil，因为可能还在锁定中
            // 但是重置界面时，应该保留原有锁定状态（如果有的话）
            // 所以我们只重置 failCount 和界面，不清除 lockUntil
            // 但为了避免刷新后还记住旧的 failCount，将其重置
            failCount = 0;
            // 不清除 lockUntil，保留锁定状态
            // 清空输入框及错误消息
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            // 重新更新UI以反映当前锁定状态
            updateLockUI();
            // 确保输入框和按钮根据锁定状态正确启用/禁用
            passwordInput.focus();
        }

        // 键盘支持: 回车验证
        function onEnterKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (lockZone.style.display !== 'none') {
                    if (!(lockUntil > Date.now())) {
                        verifyPassword();
                    }
                }
            }
        }

        // 限制输入框只能输入最多6位数字
        function enforceNumericInput(e) {
            let input = e.target;
            let value = input.value;
            let newValue = value.replace(/\D/g, '');
            if (newValue.length > 6) newValue = newValue.slice(0,6);
            if (newValue !== value) {
                input.value = newValue;
            }
        }

        // 初始化界面
        function initUI() {
            lockZone.style.display = 'block';
            dashboardZone.style.display = 'none';
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            failCount = 0;
            
            // 尝试从 localStorage 恢复锁定状态
            const hasValidLock = restoreLockFromStorage();
            if (!hasValidLock) {
                lockUntil = 0;
                clearPersistedLock();
            }
            
            // 更新 UI 以反映锁定状态（如果恢复的锁还在有效期内，输入框将被禁用）
            updateLockUI();
            
            // 如果当前是锁定状态，且倒计时未启动，则重新启动倒计时显示
            if (lockUntil > Date.now()) {
                // 清除可能残留的计时器，重新启动倒计时
                clearTimer();
                timerInterval = setInterval(() => {
                    const nowMs = Date.now();
                    const remaining = lockUntil - nowMs;
                    if (remaining <= 0) {
                        clearTimer();
                        releaseLock();
                        updateLockUI();
                        errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                        setTimeout(() => {
                            if (errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') {
                                errorMsgDiv.innerHTML = '';
                            }
                        }, 1800);
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        const secs = Math.ceil(remaining / 1000);
                        timerInfoDiv.style.display = 'block';
                        timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${secs} 秒后再试。`;
                    }
                }, 200);
            }
            
            // 添加监听
            unlockBtn.addEventListener('click', verifyPassword);
            resetLockBtn.addEventListener('click', resetToLock);
            passwordInput.addEventListener('input', enforceNumericInput);
            passwordInput.addEventListener('keypress', onEnterKey);
            passwordInput.focus();
        }

        // 页面加载启动
        initUI();

        // 定期清理过期锁（安全后备）
        setInterval(() => {
            if (lockUntil > 0 && lockUntil <= Date.now()) {
                releaseLock();
                updateLockUI();
            }
        }, 1000);
    })();
</script>
</body>
</html>
