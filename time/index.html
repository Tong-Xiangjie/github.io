<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>全屏时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', 'SF Mono', 'Fira Code', 'Consolas', monospace;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* 浅色模式（默认） */
        body.light-mode {
            background: #f5f7fa;
            color: #1a2634;
        }

        body.light-mode .clock-container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px);
        }

        body.light-mode .mode-btn {
            background: #e2e8f0;
            color: #1e293b;
            border: 1px solid #cbd5e1;
        }

        body.light-mode .mode-btn:hover {
            background: #cbd5e1;
        }

        body.light-mode .footer {
            color: #7e8a9e;
        }

        /* 深色模式 */
        body.dark-mode {
            background: #0a0e12;
            color: #eef2ff;
        }

        body.dark-mode .clock-container {
            background: rgba(10, 14, 18, 0.7);
            backdrop-filter: blur(2px);
        }

        body.dark-mode .mode-btn {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        body.dark-mode .mode-btn:hover {
            background: #334155;
        }

        body.dark-mode .footer {
            color: #5a6e8a;
        }

        .clock-container {
            text-align: center;
            padding: 2rem 3rem;
            border-radius: 3rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            min-width: 320px;
            margin-bottom: 2rem;
        }

        /* 超大时间显示 */
        .time-display {
            font-size: clamp(3.5rem, 15vw, 10rem);
            font-weight: 700;
            font-family: 'Fira Code', 'Segoe UI', monospace;
            letter-spacing: 0.02em;
            line-height: 1.2;
            margin-bottom: 1rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .time-display span {
            display: inline-block;
            min-width: 1.2em;
            text-align: center;
        }

        /* 日期区域 */
        .date-area {
            font-size: 1.1rem;
            margin-top: 0.8rem;
            margin-bottom: 0.5rem;
            opacity: 0.85;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .lunar-date {
            font-size: 0.9rem;
            margin-top: 0.4rem;
            opacity: 0.7;
            font-family: system-ui, 'Segoe UI', monospace;
        }

        /* 控制按钮区 */
        .controls {
            margin-top: 2.2rem;
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 0.6rem 1.2rem;
            border-radius: 3rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .mode-btn:active {
            transform: scale(0.96);
        }

        /* 脚注样式 */
        .footer {
            text-align: center;
            margin-top: 1rem;
            font-family: system-ui, 'Segoe UI', monospace;
            transition: color 0.3s ease;
        }

        .footer-line {
            line-height: 1.5;
        }

        .footer-line:first-child {
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .footer-line:nth-child(2) {
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .footer-line:last-child {
            font-size: 0.65rem;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }

        /* 小屏幕适配 */
        @media (max-width: 550px) {
            .clock-container {
                padding: 1.5rem 1.8rem;
                border-radius: 2rem;
                margin: 1rem;
                margin-bottom: 1.5rem;
            }
            .date-area {
                font-size: 0.9rem;
            }
            .lunar-date {
                font-size: 0.75rem;
            }
            .mode-btn {
                padding: 0.45rem 0.9rem;
                font-size: 0.75rem;
            }
            .footer-line:first-child,
            .footer-line:nth-child(2) {
                font-size: 0.7rem;
            }
            .footer-line:last-child {
                font-size: 0.6rem;
            }
            .controls {
                gap: 0.6rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
    </style>
</head>
<body class="light-mode">
<div class="clock-container">
    <!-- 超大时钟：时:分:秒 -->
    <div class="time-display" id="timeDisplay">
        <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
        <span id="ampm" style="font-size: 0.3em; margin-left: 0.15em; vertical-align: middle; display: none;"></span>
    </div>

    <!-- 公历日期 + 星期 -->
    <div class="date-area" id="gregorianDate"></div>

    <!-- 农历日期 -->
    <div class="lunar-date" id="lunarDate"></div>

    <!-- 模式切换按钮区 -->
    <div class="controls">
        <button class="mode-btn" id="lightModeBtn">☀️ 浅色</button>
        <button class="mode-btn" id="darkModeBtn">🌙 深色</button>
        <button class="mode-btn" id="toggleFormatBtn">🕒 24小时制</button>
    </div>
</div>

<!-- 三行脚注 -->
<div class="footer">
    <div class="footer-line">网页建立时间：2026年4月5日</div>
    <div class="footer-line">© 2026 铜香结 版权所有</div>
    <div class="footer-line">Powered by GitHub Pages</div>
</div>

<script>
    (function() {
        // ---------- 农历数据 (1900-2100 简明农历库) ----------
        const lunarInfo = [
            0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
            0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
            0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
            0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
            0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
            0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
            0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
            0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
            0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
            0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x055c0,0x0ab60,0x096d5,0x092e0,
            0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
            0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
            0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
            0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
            0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
            0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06b20,0x1a6c4,0x0aae0,
            0x0a2e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4,
            0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0,
            0x0b273,0x06aa0,0x0ad50,0x055d9,0x04b60,0x0a570,0x1546e,0x0a4e0,0x0d260,0x0ea65,
            0x0d530,0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,
            0x0dd45,0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,
            0x0ada0
        ];
        
        const lunarMonthNames = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
        const lunarDayNames = [
            "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
            "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
            "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"
        ];
        
        function getLunarLeapMonth(year) {
            return lunarInfo[year - 1900] & 0xf;
        }
        
        function getLunarYearDays(year) {
            let sum = 348;
            for (let i = 0x8000; i > 0x8; i >>= 1) {
                sum += (lunarInfo[year - 1900] & i) ? 1 : 0;
            }
            return sum + getLunarLeapDays(year);
        }
        
        function getLunarLeapDays(year) {
            if (getLunarLeapMonth(year)) {
                return (lunarInfo[year - 1900] & 0x10000) ? 30 : 29;
            }
            return 0;
        }
        
        function getLunarMonthDays(year, month) {
            return (lunarInfo[year - 1900] & (0x10000 >> month)) ? 30 : 29;
        }
        
        function solarToLunar(year, month, day) {
            const baseDate = new Date(1900, 0, 31);
            const targetDate = new Date(year, month - 1, day);
            let offsetDays = Math.floor((targetDate - baseDate) / 86400000);
            
            let lunarYear = 1900;
            let daysInYear = 0;
            while (offsetDays > 0) {
                daysInYear = getLunarYearDays(lunarYear);
                if (offsetDays < daysInYear) break;
                offsetDays -= daysInYear;
                lunarYear++;
            }
            
            let lunarMonth = 1;
            let isLeap = false;
            const leapMonth = getLunarLeapMonth(lunarYear);
            while (lunarMonth <= 12) {
                let monthDays;
                if (leapMonth === lunarMonth && !isLeap) {
                    monthDays = getLunarLeapDays(lunarYear);
                    isLeap = true;
                } else {
                    monthDays = getLunarMonthDays(lunarYear, lunarMonth);
                }
                if (offsetDays < monthDays) break;
                offsetDays -= monthDays;
                if (isLeap && lunarMonth === leapMonth) {
                    isLeap = false;
                }
                lunarMonth++;
            }
            if (lunarMonth > 12) {
                lunarMonth = 1;
                lunarYear++;
            }
            
            return {
                lunarYear: lunarYear,
                lunarMonth: lunarMonth,
                lunarDay: offsetDays + 1,
                isLeap: (leapMonth === lunarMonth && isLeap)
            };
        }
        
        function getLunarDateString(year, month, day) {
            const lunar = solarToLunar(year, month, day);
            const monthIndex = lunar.lunarMonth - 1;
            const monthName = lunarMonthNames[monthIndex];
            const dayName = lunarDayNames[lunar.lunarDay - 1];
            const gan = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
            const zhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
            const startYear = 1900;
            const offset = lunar.lunarYear - startYear;
            const ganIndex = (6 + offset) % 10;
            const zhiIndex = (0 + offset) % 12;
            const ganzhi = gan[ganIndex] + zhi[zhiIndex];
            const leapPrefix = lunar.isLeap ? "闰" : "";
            return `${ganzhi}年 ${leapPrefix}${monthName} ${dayName}`;
        }
        
        // ---------- 12/24小时制状态 ----------
        let is24Hour = true;   // 默认24小时制
        const hoursSpan = document.getElementById('hours');
        const ampmSpan = document.getElementById('ampm');
        const toggleBtn = document.getElementById('toggleFormatBtn');
        
        // 更新按钮文字
        function updateToggleButtonText() {
            if (toggleBtn) {
                toggleBtn.innerHTML = is24Hour ? "🕛 12小时制" : "🕒 24小时制";
            }
        }
        
        // 格式化小时 (根据当前制式)
        function formatHour(hour24) {
            if (is24Hour) {
                return hour24.toString().padStart(2, '0');
            } else {
                let hour12 = hour24 % 12;
                if (hour12 === 0) hour12 = 12;
                return hour12.toString().padStart(2, '0');
            }
        }
        
        // 获取AM/PM标识 (12小时制用)
        function getAmPm(hour24) {
            return hour24 >= 12 ? 'PM' : 'AM';
        }
        
        // 切换制式
        function toggleTimeFormat() {
            is24Hour = !is24Hour;
            updateToggleButtonText();
            // 保存偏好到localStorage
            localStorage.setItem('timeFormat', is24Hour ? '24' : '12');
            // 立即刷新时间显示
            updateClock();
        }
        
        // ---------- 时钟核心逻辑 ----------
        function updateClock() {
            const now = new Date();
            let hours24 = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            
            // 格式化时分秒
            const minutesStr = minutes.toString().padStart(2, '0');
            const secondsStr = seconds.toString().padStart(2, '0');
            
            // 根据制式显示小时
            const displayHours = formatHour(hours24);
            hoursSpan.textContent = displayHours;
            document.getElementById('minutes').textContent = minutesStr;
            document.getElementById('seconds').textContent = secondsStr;
            
            // 处理AM/PM显示
            if (!is24Hour) {
                const ampm = getAmPm(hours24);
                ampmSpan.textContent = ampm;
                ampmSpan.style.display = 'inline-block';
            } else {
                ampmSpan.style.display = 'none';
            }
            
            // 公历日期 + 星期
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[now.getDay()];
            const gregorianText = `${year}年 ${month}月 ${day}日  ${weekday}`;
            document.getElementById('gregorianDate').textContent = gregorianText;
            
            // 农历日期
            const lunarStr = getLunarDateString(year, month, day);
            document.getElementById('lunarDate').textContent = `农历 ${lunarStr}`;
        }
        
        // 切换主题模式
        function setTheme(mode) {
            const body = document.body;
            if (mode === 'dark') {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                localStorage.setItem('clockTheme', 'dark');
            } else {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                localStorage.setItem('clockTheme', 'light');
            }
        }
        
        // 读取保存的主题偏好
        function initTheme() {
            const savedTheme = localStorage.getItem('clockTheme');
            if (savedTheme === 'dark') {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        }
        
        // 读取保存的时间制式偏好
        function initTimeFormat() {
            const savedFormat = localStorage.getItem('timeFormat');
            if (savedFormat === '12') {
                is24Hour = false;
            } else {
                is24Hour = true;  // 默认24小时制
            }
            updateToggleButtonText();
        }
        
        // 启动时钟，每秒更新
        function startClock() {
            updateClock();
            setInterval(updateClock, 1000);
        }
        
        // 事件绑定
        function bindEvents() {
            const lightBtn = document.getElementById('lightModeBtn');
            const darkBtn = document.getElementById('darkModeBtn');
            if (lightBtn) {
                lightBtn.addEventListener('click', () => setTheme('light'));
            }
            if (darkBtn) {
                darkBtn.addEventListener('click', () => setTheme('dark'));
            }
            if (toggleBtn) {
                toggleBtn.addEventListener('click', toggleTimeFormat);
            }
        }
        
        // 页面初始化
        function init() {
            initTheme();
            initTimeFormat();
            startClock();
            bindEvents();
        }
        
        init();
    })();
</script>
</body>
</html>
