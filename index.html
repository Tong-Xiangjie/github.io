<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>总网站入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免复制干扰，但保留输入框可选 */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Segoe UI', 'Inter', 'Fira Code', monospace, system-ui;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* 主容器 - 玻璃质感 */
        .glass-panel {
            background: rgba(10, 18, 28, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            border: 1px solid rgba(72, 187, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.05) inset;
            width: 100%;
            max-width: 580px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* 内容区 */
        .content {
            padding: 2.2rem 2rem 2.5rem;
        }

        /* 头部暗黑徽标 */
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-icon {
            font-size: 3.2rem;
            filter: drop-shadow(0 0 6px #0ff);
            opacity: 0.9;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #eef2ff, #6bc2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.5rem;
        }
        .sub {
            font-size: 0.75rem;
            color: #7e8a9e;
            border-top: 1px dashed #2a3440;
            display: inline-block;
            margin-top: 0.6rem;
            padding-top: 0.5rem;
        }

        /* 密码面板 */
        .password-section {
            transition: all 0.2s;
        }
        .input-group {
            background: #0e1622cc;
            border-radius: 2rem;
            border: 1px solid #2a3647;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(4px);
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            font-size: 1.4rem;
            letter-spacing: 4px;
            font-weight: 500;
            color: #c0f2ff;
            width: 100%;
            outline: none;
            font-family: monospace;
        }
        .input-group input::placeholder {
            color: #3a465a;
            letter-spacing: 2px;
            font-size: 1rem;
            font-family: monospace;
        }
        .lock-icon {
            color: #4cffb0;
            font-size: 1.4rem;
        }
        button {
            background: linear-gradient(95deg, #1f2a3e, #0f172a);
            border: 1px solid #2e3b4e;
            color: #b9e2ff;
            font-weight: 600;
            padding: 0.8rem 1.4rem;
            border-radius: 2.5rem;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.97);
        }
        button:hover {
            background: #1f314a;
            border-color: #3c8dbc;
            color: white;
            box-shadow: 0 0 8px #2d68c0;
        }
        .error-msg {
            color: #ff7a6e;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            min-height: 2.5rem;
            font-weight: 500;
            background: #220c0c60;
            border-radius: 2rem;
            padding: 0.4rem;
        }
        .timer-block {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #f2b56b;
            background: #0f111acc;
            border-radius: 2rem;
            padding: 0.5rem;
        }

        /* 网站列表 (成功后才显示) */
        .dashboard {
            display: none;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            border-left: 5px solid #2bc0ff;
            padding-left: 1rem;
            color: #eef5ff;
        }
        .site-card {
            background: rgba(18, 25, 40, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            margin-bottom: 1.2rem;
            padding: 1rem 1.5rem;
            border: 1px solid #2c3e55;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .site-card:hover {
            background: #0f1b2fdd;
            border-color: #3e8bcb;
            transform: translateX(6px);
        }
        .site-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #cdedff;
            letter-spacing: 1px;
        }
        .site-link {
            background: #0b1422;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            text-decoration: none;
            color: #6bc2ff;
            border: 1px solid #2e5570;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .site-link:hover {
            background: #00a6ff20;
            color: white;
            border-color: #2bc0ff;
            box-shadow: 0 0 6px #0af;
        }
        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #3f506e;
            border-top: 1px solid #1e2a3a;
            padding-top: 1rem;
        }
        .back-btn {
            background: none;
            border: 1px solid #3e556e;
            margin-top: 1rem;
            color: #9ab3cf;
            width: auto;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        /* 禁用状态 */
        input:disabled, button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width: 480px) {
            .content { padding: 1.5rem; }
            .site-card { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
            .site-link { align-self: flex-start; }
        }
    </style>
</head>
<body>
<div class="glass-panel" id="appRoot">
    <div class="content">
        <!-- 未解锁区域 (密码界面) -->
        <div id="lockZone">
            <div class="logo-area">
                <div class="logo-icon">⛧</div>
                <h1>请验证后进入</h1>
                <div class="sub">VERIFICATION GATE</div>
            </div>
            <div class="password-section">
                <div class="input-group">
                    <span class="lock-icon"></span>
                    <input type="password" id="passwordInput" maxlength="6" placeholder="请输入6位数字密码" inputmode="numeric" pattern="\d*">
                </div>
                <button id="unlockBtn">验证/VERIFY</button>
                <div id="errorMsg" class="error-msg"></div>
                <div id="timerInfo" class="timer-block" style="display: none;"></div>
            </div>
        </div>

        <!-- 解锁后网站列表区域 -->
        <div id="dashboardZone" class="dashboard">
            <div class="logo-area" style="margin-bottom: 1rem;">
                <div class="logo-icon">🜄</div>
                <h1>网页总站</h1>
                <div class="sub">ACCESS GRANTED</div>
            </div>
            <div class="section-title">分站入口</div>
            <div class="site-card">
                <span class="site-name">钱币收藏档案</span>
                <a href="https://Tong-Xiangjie.github.io/notecollection/" class="site-link" target="_blank" rel="noopener noreferrer">
                    notecollection ↗
                </a>
            </div>
            <!-- 预留扩展其他分站，未来可加 -->
            <div class="site-card" style="opacity: 0.7;">
                <span class="site-name">🌌 更多站点 (待接入)</span>
                <span class="site-link" style="background:#11161f; cursor:default;">即将开放</span>
            </div>
            <div class="footer-note">
                网址建立时间：2026年4月3日<br>© 2026 铜香结 版权所有<br>Powered by GitHub Pages
            </div>
            <button id="resetLockBtn" class="back-btn">⟳ 返回锁定界面</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- 状态管理 ----------
        // 有效密码列表 (6位数字)
        const VALID_CODES = new Set(["070529", "790815"]);
        
        // 锁定状态变量
        let lockUntil = 0;            // 时间戳 (毫秒) 锁定的截止时刻
        let failCount = 0;            // 当前连续错误次数 (每次锁定周期内)
        let isLocked = false;          // 辅助标志, 实际根据 lockUntil 和 Date.now 判断
        
        let timerInterval = null;      // 倒计时刷新句柄
        
        // DOM 元素
        const lockZone = document.getElementById('lockZone');
        const dashboardZone = document.getElementById('dashboardZone');
        const passwordInput = document.getElementById('passwordInput');
        const unlockBtn = document.getElementById('unlockBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        const timerInfoDiv = document.getElementById('timerInfo');
        const resetLockBtn = document.getElementById('resetLockBtn');
        
        // 辅助函数: 清除计时器
        function clearTimer() {
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        // 更新界面锁定状态 (禁用输入框、按钮、显示倒计时等)
        function updateLockUI() {
            const now = Date.now();
            const isCurrentlyLocked = (lockUntil > now);
            
            if(isCurrentlyLocked) {
                isLocked = true;
                const remainSeconds = Math.ceil((lockUntil - now) / 1000);
                if(remainSeconds > 0) {
                    timerInfoDiv.style.display = 'block';
                    timerInfoDiv.innerHTML = ` 验证失败次数过多，已锁定。<br>请 ${remainSeconds} 秒后再试。 `;
                } else {
                    // 理论上锁到期会在 tick 里清理, 但先处理边界
                    if(lockUntil <= now) releaseLock();
                    return;
                }
                // 禁用输入和按钮
                passwordInput.disabled = true;
                unlockBtn.disabled = true;
                errorMsgDiv.innerHTML = '账户暂时锁定，请稍后再试';
            } else {
                // 未锁定状态
                if(lockUntil === 0 || lockUntil <= now) {
                    // 确保释放锁
                    releaseLock();
                }
                passwordInput.disabled = false;
                unlockBtn.disabled = false;
                timerInfoDiv.style.display = 'none';
                // 不清空errorMsg, 但清除锁定类错误提示（仅当无错误时）
                if(errorMsgDiv.innerHTML.includes('锁定') || errorMsgDiv.innerHTML.includes('等待')) {
                    if(failCount === 0) errorMsgDiv.innerHTML = '';
                }
            }
        }
        
        // 释放锁定 (重置错误计数, 清空计时器)
        function releaseLock() {
            const wasLocked = (lockUntil > Date.now());
            lockUntil = 0;
            isLocked = false;
            // 注意: 当锁释放时，不清除failCount？按照设计规范: "如果接下来又错了三次也是等这么久" 
            // 意思是在同一个锁定周期解锁后，错误计数应该重置? 但为了连续逻辑，每次锁定结束后连续错误次数应当归零。
            // 规范: 连续输错三次，等待30秒。如果接下来又错了三次也是等这么久。就是说每次锁定周期独立计数。
            // 释放锁后，错误计数归零，重新累计。
            if(wasLocked) {
                failCount = 0;
            }
            clearTimer();
            updateLockUI();
            // 如果之前是因为锁而清空的错误提示，这里可以清一下非锁错误残留，但保留正常错误由验证逻辑填充
            if(!errorMsgDiv.innerHTML.includes('密码') && !errorMsgDiv.innerHTML.includes('错误')) {
                if(failCount === 0) errorMsgDiv.innerHTML = '';
            }
        }
        
        // 设置锁定30秒 (保留当前错误次数已经达到3)
        function applyLockout() {
            const now = Date.now();
            lockUntil = now + 30000;   // 30秒锁定
            // 锁定期间不清除failCount，但锁定结束后会重置。但要确保倒计时期间失败不再累加（按钮禁用）
            clearTimer();
            updateLockUI();
            // 启动倒计时刷新
            timerInterval = setInterval(() => {
                const remaining = lockUntil - Date.now();
                if(remaining <= 0) {
                    // 锁定到期
                    clearTimer();
                    releaseLock();      // 重置failCount并解锁界面
                    updateLockUI();
                    // 清空错误提示框温和恢复
                    errorMsgDiv.innerHTML = '锁定已解除，请重新输入密码';
                    setTimeout(() => {
                        if(errorMsgDiv.innerHTML === '锁定已解除，请重新输入密码') errorMsgDiv.innerHTML = '';
                    }, 1800);
                    passwordInput.value = '';
                } else {
                    const secs = Math.ceil(remaining / 1000);
                    timerInfoDiv.innerHTML = `验证失败次数过多，已锁定。<br>请 ${secs} 秒后再试。`;
                }
            }, 200);
        }
        
        // 处理验证失败
        function handleFail() {
            // 先检查当前是否锁定中 (安全)
            if(lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = '系统锁定中，请等待倒计时结束。';
                return;
            }
            
            // 未锁定状态，增加错误计数
            failCount++;
            const remainingAttempts = 3 - failCount;
            if(failCount >= 3) {
                // 达到三次错误 -> 触发锁定30秒
                errorMsgDiv.innerHTML = `已连续错误3次！系统锁定30秒，无法进行任何操作 `;
                applyLockout();
                // 清空输入框
                passwordInput.value = '';
                // 锁定后不用再提示剩余尝试次数
            } else {
                // 未达三次，显示剩余尝试
                errorMsgDiv.innerHTML = `密码错误！还剩 ${remainingAttempts} 次尝试机会，连续错误3次将锁定30秒`;
                passwordInput.value = '';
                passwordInput.focus();
                // 确保没有锁定倒计时显示隐藏
                timerInfoDiv.style.display = 'none';
            }
            // 震动效果(可选)
            const panel = document.querySelector('.glass-panel');
            if(panel) {
                panel.style.transform = 'translateX(3px)';
                setTimeout(() => { if(panel) panel.style.transform = ''; }, 100);
            }
        }
        
        // 验证成功: 进入仪表板
        function handleSuccess() {
            // 清除锁定状态、重置计数器、清除计时器
            clearTimer();
            lockUntil = 0;
            failCount = 0;
            isLocked = false;
            // 清空输入框以及错误消息
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            
            // 切换显示: 隐藏锁界面，展示仪表板
            lockZone.style.display = 'none';
            dashboardZone.style.display = 'block';
            // 可额外重置页面title
        }
        
        // 验证密码核心
        function verifyPassword() {
            // 如果当前处于锁定状态，阻止验证
            if(lockUntil > Date.now()) {
                errorMsgDiv.innerHTML = `锁定倒计时进行中，请耐心等待。`;
                return;
            }
            
            const rawValue = passwordInput.value;
            // 过滤非数字，但本身限制maxlength且输入法数字，但以防万一
            const trimmed = rawValue.trim();
            if(trimmed.length !== 6) {
                errorMsgDiv.innerHTML = ' 请输入6位数字密码';
                passwordInput.value = '';
                return;
            }
            // 检查是否为纯数字 (额外保证)
            if(!/^\d{6}$/.test(trimmed)) {
                errorMsgDiv.innerHTML = '密码必须为6位数字 (0-9)';
                passwordInput.value = '';
                return;
            }
            
            // 正式校验
            if(VALID_CODES.has(trimmed)) {
                // 密码正确
                // 重置错误计数，清除任何锁存残留
                failCount = 0;
                if(lockUntil) lockUntil = 0;
                clearTimer();
                handleSuccess();
            } else {
                // 错误处理
                handleFail();
            }
        }
        
        // 重置/退出登录 (从仪表板返回锁定界面，重置所有状态)
        function resetToLock() {
            // 清除dashboard显示，显示锁界面
            dashboardZone.style.display = 'none';
            lockZone.style.display = 'block';
            
            // 重置所有安全状态: 清除锁定计时器, 重置失败次数, 清除锁定时间戳
            clearTimer();
            lockUntil = 0;
            failCount = 0;
            isLocked = false;
            // 清空输入框及错误消息
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            // 确保输入框和按钮启用
            passwordInput.disabled = false;
            unlockBtn.disabled = false;
            // 重新聚焦
            passwordInput.focus();
            // 额外的界面清爽
            const anyLockMsg = timerInfoDiv;
            if(anyLockMsg) anyLockMsg.style.display = 'none';
        }
        
        // 键盘支持: 回车验证
        function onEnterKey(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                if(lockZone.style.display !== 'none') {
                    // 仅在锁界面有效
                    if(!(lockUntil > Date.now())) {
                        verifyPassword();
                    }
                }
            }
        }
        
        // 限制输入框只能输入最多6位数字, 实时过滤
        function enforceNumericInput(e) {
            let input = e.target;
            let value = input.value;
            // 移除非数字
            let newValue = value.replace(/\D/g, '');
            if(newValue.length > 6) newValue = newValue.slice(0,6);
            if(newValue !== value) {
                input.value = newValue;
            }
        }
        
        // 初始化界面，默认锁界面可见，仪表板隐藏
        function initUI() {
            lockZone.style.display = 'block';
            dashboardZone.style.display = 'none';
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            failCount = 0;
            lockUntil = 0;
            passwordInput.disabled = false;
            unlockBtn.disabled = false;
            // 添加监听
            unlockBtn.addEventListener('click', verifyPassword);
            resetLockBtn.addEventListener('click', resetToLock);
            passwordInput.addEventListener('input', enforceNumericInput);
            passwordInput.addEventListener('keypress', onEnterKey);
            // 额外聚焦
            passwordInput.focus();
        }
        
        // 处理页面加载后可能的自动残留计时 (无)
        initUI();
        
        // 附加特性: 如果由于某些原因定时器外部干扰，可以定期清理保护
        window.addEventListener('load', () => {
            // 确保任何异常锁定不残留
            if(lockUntil < Date.now() && lockUntil !==0) {
                releaseLock();
            }
            passwordInput.focus();
        });
        
        // 当用户通过reset返回时，保证所有变量重置并且计时器清理干净，并且启用控件
        // 增强 resetLockBtn 确保完全重置
        const originalResetHandler = resetLockBtn.onclick;
        resetLockBtn.addEventListener('click', () => {
            // 重置前清理全局计时器，避免倒计时继续干扰
            clearTimer();
            lockUntil = 0;
            failCount = 0;
            if(dashboardZone.style.display === 'block') {
                dashboardZone.style.display = 'none';
                lockZone.style.display = 'block';
            }
            passwordInput.disabled = false;
            unlockBtn.disabled = false;
            passwordInput.value = '';
            errorMsgDiv.innerHTML = '';
            timerInfoDiv.style.display = 'none';
            passwordInput.focus();
        });
        
        // 防止全局未锁定的时候任何不合理的错误计数残留
        // 完善锁定状态下倒计时解锁时刷新界面
        function safetyWatch() {
            // 如果锁界面可见且锁时间过去，恢复界面（以防计时器异常）
            if(lockZone.style.display !== 'none' && lockUntil > 0 && lockUntil <= Date.now()) {
                releaseLock();
                updateLockUI();
                errorMsgDiv.innerHTML = ' 锁定已结束，请继续输入';
                setTimeout(()=>{
                    if(errorMsgDiv.innerHTML === ' 锁定已结束，请继续输入') errorMsgDiv.innerHTML = '';
                },1500);
            }
        }
        setInterval(safetyWatch, 800);
    })();
</script>
</body>
</html>
